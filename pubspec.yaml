name: tmdb
description: "A movie browser powered by The Movie Database (TMDB) API."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking & data
  http: ^1.2.0
  dartz: ^0.10.1
  equatable: ^2.0.7
  flutter_dotenv: ^5.2.1

  # State management & DI
  flutter_bloc: ^9.1.0
  get_it: ^8.0.3

  # UI
  cached_network_image: ^3.4.1
  google_fonts: ^8.0.2
  iconsax_plus: ^1.0.0
  shimmer: ^3.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - .env
