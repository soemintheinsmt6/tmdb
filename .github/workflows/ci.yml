name: Flutter CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.4
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # `.env` is gitignored and bundled as an asset; CI writes a placeholder so
      # the asset resolves. Tests mock the network, so the value is never used.
      - name: Create placeholder .env
        run: |
          echo "BASE_URL=https://api.themoviedb.org/3" > .env
          echo "API_KEY=ci-placeholder" >> .env

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 7
