# Static analysis configuration. Run via `flutter analyze`.
#
# Builds on the recommended Flutter lints with a curated set of additional
# rules chosen for this project — favouring correctness and consistency
# without the churn of an everything-on ruleset. See docs/adr/ for rationale.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Treat unawaited futures as an error — silent fire-and-forget async is a
    # real bug class (see the favourites write fix).
    unawaited_futures: error

linter:
  rules:
    # Async correctness
    - unawaited_futures
    - discarded_futures
    # Immutability / const
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    - prefer_final_locals
    # Clarity
    - always_declare_return_types
    - directives_ordering
    - prefer_single_quotes
    - require_trailing_commas
    - unnecessary_parenthesis
    - use_super_parameters
    # Safety
    - avoid_print
    - throw_in_finally
